steps:
  # Step 1: Build the Docker image
  # IMPORTANT: We pass build-args here so Vite can access them during 'npm run build'
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA",
        "--build-arg",
        "VITE_GOOGLE_CLIENT_ID=${_VITE_GOOGLE_CLIENT_ID}",
        "--build-arg",
        "VITE_MICROSOFT_CLIENT_ID=${_VITE_MICROSOFT_CLIENT_ID}",
        "--build-arg",
        "VITE_GITHUB_CLIENT_ID=${_VITE_GITHUB_CLIENT_ID}",
        ".",
      ]
    id: "Build Image"

  # Step 2: Push the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA",
      ]
    id: "Push Image"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "$_SERVICE_NAME",
        "--image",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA",
        "--region",
        "$_REGION",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--port",
        "8080",
      ]
    id: "Deploy"

images:
  - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA"

substitutions:
  _REGION: asia-south1
  _REPO_NAME: invoice-ui
  _SERVICE_NAME: react-app
  # Provide empty defaults so the build doesn't crash if they aren't in the Trigger UI
  _VITE_GOOGLE_CLIENT_ID: ""
  _VITE_MICROSOFT_CLIENT_ID: ""
  _VITE_GITHUB_CLIENT_ID: ""

options:
  logging: CLOUD_LOGGING_ONLY
